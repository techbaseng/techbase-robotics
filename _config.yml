title: "Techbase – Robotics & Arduino"
description: "A free intermediate Robotics course by Techbase Consultant Services, Ibadan, Nigeria."
baseurl: "/techbase-robotics"

url: "https://techbaseng.github.io"

author: "Babatunde Awoyemi"

theme: minima

minima:
  skin: classic
  social_links:
    - { platform: github, user_url: "https://github.com/techbaseng" }

header_pages:
  - README.md

markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - "*.sh"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
